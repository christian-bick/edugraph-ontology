name: Release

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short=12 HEAD)" >> $GITHUB_OUTPUT

      - name: Set Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "PACKAGE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set Pre-release Version
        if: startsWith(github.ref, 'refs/heads/')
        run: echo "PACKAGE_VERSION=0.0.0-pre.${{ steps.vars.outputs.sha_short }}" >> $GITHUB_ENV

      - name: Generate all ontology files
        run: docker build --build-arg PACKAGE_VERSION=${{ env.PACKAGE_VERSION }} . --output dist

      - name: Update package.json version
        run: |
          cd dist/typescript
          npm version ${{ env.PACKAGE_VERSION }} --no-git-tag-version
          cd ../..

      - name: Create tarball
        run: |
          cd dist
          tar -czvf ../edugraph-ts.tgz typescript
          cd ..

      - name: Set Python Asset Paths
        run: |
          echo "WHEEL_PATH=$(ls dist/python/dist/*.whl)" >> $GITHUB_ENV
          echo "SDIST_PATH=$(ls dist/python/dist/*.tar.gz)" >> $GITHUB_ENV
          echo "WHEEL_NAME=$(basename dist/python/dist/*.whl)" >> $GITHUB_ENV
          echo "SDIST_NAME=$(basename dist/python/dist/*.tar.gz)" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('preview-{0}', steps.vars.outputs.sha_short) }}
          release_name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Preview {0}', steps.vars.outputs.sha_short) }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload core-schema.ttl
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/core-schema.ttl
          asset_name: core-schema.ttl
          asset_content_type: plain/turtle

      - name: Upload core-abilities.ttl
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/core-abilities.ttl
          asset_name: core-abilities.ttl
          asset_content_type: plain/turtle

      - name: Upload core-areas-math.ttl
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/core-areas-math.ttl
          asset_name: core-areas-math.ttl
          asset_content_type: plain/turtle

      - name: Upload core-scopes-math.ttl
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/core-scopes-math.ttl
          asset_name: core-scopes-math.ttl
          asset_content_type: plain/turtle

      - name: Upload core-ontology-math.rdf
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/core-ontology-math.rdf
          asset_name: core-ontology-math.rdf
          asset_content_type: application/xml+rdf

      - name: Upload TypeScript Package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./edugraph-ts.tgz
          asset_name: edugraph-ts.tgz
          asset_content_type: application/gzip

      - name: Upload Python Wheel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.WHEEL_PATH }}
          asset_name: ${{ env.WHEEL_NAME }}
          asset_content_type: application/octet-stream

      - name: Upload Python Source Dist
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.SDIST_PATH }}
          asset_name: ${{ env.SDIST_NAME }}
          asset_content_type: application/gzip

      - name: Clean up older pre-releases
        uses: sgpublic/delete-release-action@v1.2
        with:
          pre-release-drop: true
          pre-release-keep-count: ${{ startsWith(github.ref, 'refs/tags/') && -1 || 0 }}
          pre-release-drop-tag: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
